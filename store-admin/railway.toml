# Railway: crear servicio desde este repo y poner "Root Directory" = store-admin
# Anadir plugin PostgreSQL; DATABASE_URL se inyecta sola al enlazar la DB al servicio.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run start:railway"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
