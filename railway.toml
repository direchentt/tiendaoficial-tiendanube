# Railway: usa Nixpacks (NO Dockerfile)
# Root Directory del servicio debe ser "store-admin"
# o bien el monorepo usa este railway.toml en la raíz apuntando al subdirectorio.

[build]
builder = "NIXPACKS"
# Sin migrate aquí: en Docker build a veces no hay DB o el pooler falla; las migraciones corren al arrancar (start:railway).
buildCommand = "cd store-admin && npm ci && npx prisma generate && npm run build"

[deploy]
# exec: PID 1 = node (mejor señales); sin npm (menos capas).
startCommand = "cd store-admin && exec node scripts/railway-start.mjs"
healthcheckPath = "/api/health"
# migrate + cold start de Next pueden superar 2m en instancias chicas
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
