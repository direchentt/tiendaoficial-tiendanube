# Railway: usa Nixpacks (NO Dockerfile)
# Root Directory del servicio debe ser "store-admin"
# o bien el monorepo usa este railway.toml en la raíz apuntando al subdirectorio.

[build]
builder = "NIXPACKS"
# Prisma schema usa directUrl = env("DIRECT_URL"). Si no está en Railway, usar la misma URL que DATABASE_URL (pooler).
buildCommand = "export DIRECT_URL=\"${DIRECT_URL:-$DATABASE_URL}\" && cd store-admin && npm ci && npx prisma generate && npx prisma migrate deploy && npm run build"

[deploy]
startCommand = "cd store-admin && npx next start -H 0.0.0.0 -p ${PORT:-3000}"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
